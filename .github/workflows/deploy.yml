name: Deploy → Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SFTP → Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:          ${{ secrets.FTP_HOST }}
          username:        ${{ secrets.FTP_USER }}
          password:        ${{ secrets.FTP_PASS }}
          local-dir:       ./public/
          server-dir:      ${{ secrets.FTP_PATH }}
          # estado novo: força reenvio completo (estado anterior corrompeu e
          # fazia o deploy pular arquivos. Não deleta nada do servidor).
          state-name:      .ftp-deploy-state-v2.json
          exclude:         |
            **/.git*
            **/.git*/**
            **/node_modules/**
